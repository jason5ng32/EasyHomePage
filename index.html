<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Markdown-driven personal homepage." />
  <title>EasyHomePage</title>
  <link rel="icon" href="favicon.ico">

  <style>
    :root {
      color-scheme: light dark;
      --jn-loading-bg: #ece9df;
      --jn-loading-fg: #101010;
      --jn-loading-muted: #6c685f;
      --jn-loading-card: rgba(247, 247, 244, 0.86);
      --jn-loading-border: rgba(16, 16, 16, 0.12);
      --jn-loading-accent: #b6ff55;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --jn-loading-bg: #050505;
        --jn-loading-fg: #f7f3ea;
        --jn-loading-muted: rgba(247, 243, 234, 0.62);
        --jn-loading-card: rgba(20, 20, 20, 0.82);
        --jn-loading-border: rgba(247, 243, 234, 0.12);
      }
    }

    .jn-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      min-width: 320px;
      background:
        radial-gradient(circle at 50% 110%, rgba(182, 255, 85, 0.18), transparent 34%),
        var(--jn-loading-bg);
      color: var(--jn-loading-fg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .jn-loading-card {
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: calc(100vw - 32px);
      padding: 12px 18px 12px 12px;
      border: 1px solid var(--jn-loading-border);
      border-radius: 999px;
      background: var(--jn-loading-card);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(18px);
    }

    .jn-loading-logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .jn-loading-copy {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .jn-loading-title {
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .jn-loading-description {
      margin: 0;
      color: var(--jn-loading-muted);
      font-size: 12px;
      font-weight: 600;
    }

    .jn-loading-progress {
      position: relative;
      width: 58px;
      height: 4px;
      margin-left: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--jn-loading-border);
    }

    .jn-loading-progress::before {
      content: "";
      position: absolute;
      inset-block: 0;
      left: -40%;
      width: 42%;
      border-radius: inherit;
      background: var(--jn-loading-accent);
      animation: loading-slide 1.1s ease-in-out infinite;
    }

    @keyframes loading-slide {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(340%);
      }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-BaSA9hl-.js"></script>

<body>
  <div id="jn-loading" class="jn-loading" role="status" aria-live="polite">
    <div class="jn-loading-card">
      <img class="jn-loading-logo" src="logo.png" alt="">
      <div class="jn-loading-copy">
        <strong class="jn-loading-title">正在加载主页</strong>
        <p class="jn-loading-description">内容马上就绪</p>
      </div>
      <div class="jn-loading-progress" aria-hidden="true"></div>
    </div>
  </div>
  <div id="app"></div>
</body>
